name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcre3-dev postgresql-server-dev-16

      - name: Set up Stack
        uses: haskell-actions/setup@v2
        with:
          enable-stack: true

      - name: Cache Stack
        uses: actions/cache@v5
        with:
          path: |
            ~/.stack
            .stack-work
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stack-

      - name: Set up dummy DB files
        run: |
          touch .db_username
          touch .db_password

      - name: Run tests
        run: stack test
